<!DOCTYPE html>
<html>
<head>
    <title>JobShield AI - Result</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="hero">
    <img src="/static/logo.png" alt="JobShield AI Logo">
    <h1>Analysis Result</h1>
</div>

<div class="container">

    <div class="result-box" style="background-color: {{ color }};">
        <h2>{{ result }}</h2>
        <p style="margin-top:15px;">Confidence Score: {{ confidence }}%</p>

        <div class="confidence-bar">
            <div class="confidence-fill" id="confidenceFill"></div>
        </div>

        <p style="margin-top:25px;">{{ warning }}</p>
    </div>

    <a href="/" style="text-decoration:none;">
        <button>Analyze Another Posting</button>
    </a>

</div>

<div class="footer">
    © 2026 JobShield AI
</div>

<script>
    window.onload = function() {
        const confidence = {{ confidence }};
        document.getElementById("confidenceFill").style.width = confidence + "%";
    }
</script>

</body>
</html>
