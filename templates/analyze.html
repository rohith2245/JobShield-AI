{% extends "base.html" %}

{% block content %}

<div class="card p-4">
    <h4 class="mb-4">Enter Job Details</h4>

    <form method="POST">

        <div class="mb-3">
            <label>Job Title</label>
            <input type="text" class="form-control" name="title" required>
        </div>

        <div class="mb-3">
            <label>Company Profile</label>
            <textarea class="form-control" name="company_profile" required></textarea>
        </div>

        <div class="mb-3">
            <label>Job Description</label>
            <textarea class="form-control" name="description" required></textarea>
        </div>

        <div class="mb-3">
            <label>Requirements</label>
            <textarea class="form-control" name="requirements" required></textarea>
        </div>

        <div class="mb-3">
            <label>Benefits</label>
            <textarea class="form-control" name="benefits"></textarea>
        </div>

        <div class="mb-3">
            <label>Salary</label>
            <input type="text" class="form-control" name="salary">
        </div>

        <button class="btn btn-primary w-100">
            Analyze Job Posting
        </button>

    </form>
</div>

{% endblock %}
